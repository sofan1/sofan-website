name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Remove API routes (not supported on static export)
        run: rm -rf src/app/api

      - name: Build static site
        env:
          NEXT_PUBLIC_BASE_PATH: /sofan-website
        run: |
          # Patch next.config.ts for static export
          cat > next.config.ts << 'NEXTCFG'
          import type { NextConfig } from "next";

          const nextConfig: NextConfig = {
            output: "export",
            basePath: "/sofan-website",
            images: {
              unoptimized: true,
            },
            typescript: {
              ignoreBuildErrors: true,
            },
            reactStrictMode: false,
          };

          export default nextConfig;
          NEXTCFG

          # Patch layout.tsx metadataBase to avoid build errors
          sed -i 's|new URL("https://mnsofan.space-z.ai")|new URL("https://sofan1.github.io/sofan-website")|' src/app/layout.tsx

          bun run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4